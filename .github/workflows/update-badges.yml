name: update-badges

on:
  schedule:
    - cron: '15,45 * * * *'  # offset from codemaxxed's runs
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats and update badges
        run: |
          # fetch latest stats from codemaxxed
          curl -sf https://raw.githubusercontent.com/jshchnz/codemaxxed/main/stats.json -o /tmp/stats.json || exit 0

          LINES=$(jq -r '.lines' /tmp/stats.json)
          FILES=$(jq -r '.files' /tmp/stats.json)
          COMMITS=$(jq -r '.commits' /tmp/stats.json)

          fmt_num() { echo "$1" | sed -e :a -e 's/\(.*[0-9]\)\([0-9]\{3\}\)/\1,\2/;ta'; }
          LINES_FMT=$(fmt_num "$LINES")
          FILES_FMT=$(fmt_num "$FILES")
          COMMITS_FMT=$(fmt_num "$COMMITS")
          LINES_URL=$(echo "$LINES_FMT" | sed 's/,/%2C/g')
          FILES_URL=$(echo "$FILES_FMT" | sed 's/,/%2C/g')
          COMMITS_URL=$(echo "$COMMITS_FMT" | sed 's/,/%2C/g')

          sed -i "s|<!-- LINES_BADGE -->.*<!-- /LINES_BADGE -->|<!-- LINES_BADGE -->![Lines of Code](https://img.shields.io/badge/lines%20of%20code-${LINES_URL}%20and%20counting-brightgreen?style=for-the-badge)<!-- /LINES_BADGE -->|" README.md
          sed -i "s|<!-- FILES_BADGE -->.*<!-- /FILES_BADGE -->|<!-- FILES_BADGE -->![Files](https://img.shields.io/badge/files-${FILES_URL}-blue?style=for-the-badge)<!-- /FILES_BADGE -->|" README.md
          sed -i "s|<!-- COMMITS_BADGE -->.*<!-- /COMMITS_BADGE -->|<!-- COMMITS_BADGE -->![Commits](https://img.shields.io/badge/commits-${COMMITS_URL}-orange?style=for-the-badge)<!-- /COMMITS_BADGE -->|" README.md

      - name: Commit and push
        run: |
          git config user.name "codemaxxing-bot"
          git config user.email "codemaxxing-bot@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "update badges from codemaxxed stats" && git push)
